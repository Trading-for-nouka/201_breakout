name: Daily Breakout Scan

on:
  #schedule:
    #- cron: '13 7 * * 1-5'   # 平日16:13 JST
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    # 書き込み権限を明示的に許可
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy ta requests

    - name: Run Scan
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: python scan.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # ファイルが存在する場合のみ追加
        if [ -f selected_positions.json ]; then
          git add selected_positions.json
          # 変更がある場合のみコミットしてプッシュ
          if ! git diff --cached --quiet; then
            git commit -m "Update selected positions [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
        fi
